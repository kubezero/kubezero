---
# This ExternalSecret reads the kubeconfig generated by Crossplane XEKS
# and creates an Argo CD-compatible cluster secret in JSON format.
apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: cluster-secret
  namespace: kubezero
  labels:
    argocd.argoproj.io/secret-type: cluster
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: kubezero-management
    kind: ClusterSecretStore
  target:
    name: cluster-secret
    creationPolicy: Owner
  data:
    - secretKey: kubeconfig
      remoteRef:
        key: configuration-aws-eks-kubeconfig
        property: kubeconfig
  template:
    engineVersion: v2
    data:
      name: configuration-aws-eks
      server: '{{ (index (index .kubeconfig "clusters") 0).cluster.server }}'
      config: |
        {
          "tlsClientConfig": {
            "insecure": false,
            "caData": "{{ (index (index .kubeconfig \"clusters\") 0).cluster.certificate-authority-data }}",
            "certData": "{{ (index (index .kubeconfig \"users\") 0).user.client-certificate-data }}",
            "keyData": "{{ (index (index .kubeconfig \"users\") 0).user.client-key-data }}"
          }
        }
